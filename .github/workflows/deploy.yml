name: Deploy to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    uses: ./.github/workflows/test.unit.yml
    secrets: inherit

  deploy:
    if: github.event_name == 'push'
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.VPS_USER }}

            if [ ! -d "event-hub" ]; then
              git clone https://github.com/${{ secrets.REPO_NAME }}.git event-hub
            fi

            cd event-hub
            git pull origin main

            cat <<EOF > event-hub-api/.env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            APP_NAME=EventHub
            EOF

            docker compose down
            docker compose build
            docker compose up -d

      - name: Notify on failure
        if: failure()
        run: echo "::error::Le déploiement a échoué sur main !"